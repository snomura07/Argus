services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: argus-app
    command: >
      sh -lc "mkdir -p /var/www/html/storage /var/www/html/bootstrap/cache
      && chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache
      && php-fpm"
    working_dir: /var/www/html
    volumes:
      - ../src:/var/www/html
    environment:
      TZ: Asia/Tokyo
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: argus-web
    ports:
      - "8080:80"
    volumes:
      - ../src:/var/www/html
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: argus-db
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
      MYSQL_DATABASE: argus
      MYSQL_USER: argus
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ../db:/var/lib/mysql

volumes: {}
